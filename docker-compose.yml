version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: murad-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: murad_ai
      MYSQL_USER: murad
      MYSQL_PASSWORD: murad123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: murad-app
    environment:
      DATABASE_URL: mysql://murad:murad123@mysql:3306/murad_ai
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev

volumes:
  mysql_data:
